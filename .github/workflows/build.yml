name: Flutter Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build target (web or apk)'
        required: true
        default: 'web'

# Sequential deployment to gh-pages prevents Git lock errors
concurrency:
  group: pages-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Java
        if: github.event.inputs.build_type == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        if: github.event.inputs.build_type == 'apk'
        uses: gradle/actions/setup-gradle@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Initialize Project
        run: |
          TARGET="${{ github.event.inputs.build_type }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Skip scaffold if already present to save time
          if [ "$TARGET" == "apk" ]; then
            if [ ! -d "android" ]; then
              flutter create . --platforms=android --project-name=app --overwrite
            fi
            # Inject speed-up Gradle flags
            mkdir -p android
            echo "org.gradle.caching=true" > android/gradle.properties
            echo "org.gradle.parallel=true" >> android/gradle.properties
            echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          else
            if [ ! -d "web" ]; then
              flutter create . --platforms=web --project-name=app --overwrite
            fi
          fi
          
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          
          mkdir -p assets images fonts
          flutter pub get

      - name: Build Web (preview for GitHub Pages)
        if: github.event.inputs.build_type == 'web'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          # Use --no-pub and HTML renderer for fastest preview build/load
          flutter build web --release --no-pub --web-renderer html --base-href "/$REPO_NAME/previews/${{ github.ref_name }}/"
          echo "" | base64 -d > capture_script.html
          node -e "const fs = require('fs'); const path = 'build/web/index.html'; let html = fs.readFileSync(path, 'utf8'); const script = fs.readFileSync('capture_script.html', 'utf8'); html = html.replace('</body>', script + '</body>'); fs.writeFileSync(path, html);"
          cp build/web/index.html build/web/404.html

      - name: Stage site for Pages deploy
        if: github.event.inputs.build_type == 'web'
        run: |
          rm -rf myth-pages-bundle
          mkdir -p myth-pages-bundle
          cp -a build/web/. myth-pages-bundle/
          touch myth-pages-bundle/.nojekyll
          rm -f myth-pages-bundle/.gitignore

      - name: Deploy Preview 🚀
        if: success() && github.event.inputs.build_type == 'web'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: myth-pages-bundle
          branch: gh-pages
          target-folder: previews/${{ github.ref_name }}
          clean: false
          force: false
          
      - name: Ensure gh-pages root (index + .nojekyll)
        if: success() && github.event.inputs.build_type == 'web'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-root
          cd gh-pages-root
          touch .nojekyll
          if [ ! -f "index.html" ]; then
            echo "<!DOCTYPE html><html><body>MYTH Build System — previews live under <code>previews/</code></body></html>" > index.html
          fi
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Pages root: .nojekyll + index (MYTH)"
            git push origin gh-pages
          fi

      - name: Point GitHub Pages at gh-pages (legacy)
        if: success() && github.event.inputs.build_type == 'web'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payload = {
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' }
            };
            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner, repo, ...payload
              });
            } catch (e) {
              const st = e.status || e.response?.status;
              if (st === 404) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/pages', {
                    owner, repo, ...payload
                  });
                } catch (e2) {}
              }
            }

      - name: Build APK
        id: build_apk
        if: github.event.inputs.build_type == 'apk'
        run: flutter build apk --release --no-pub --target-platform android-arm64

      - name: Upload Artifacts
        if: success() && github.event.inputs.build_type == 'apk' && steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/app/outputs/flutter-apk/app-release.apk