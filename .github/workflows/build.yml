name: Flutter Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build target (web or apk)'
        required: true
        default: 'web'

# Sequential deployment to gh-pages prevents Git lock errors (cannot lock ref)
concurrency:
  group: pages-deploy-${{ github.ref_name }} # Narrower group per-branch for parallel builds
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        if: github.event.inputs.build_type == 'apk' || github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Initialize Project
        run: |
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Always regenerate web + android so APK runs still have a valid web/ tree for Pages.
          flutter create . --platforms=web,android --project-name=app --overwrite
          
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          flutter pub get

      - name: Build Web (preview for GitHub Pages)
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          flutter build web --release --base-href "/$REPO_NAME/previews/${{ github.ref_name }}/"
          echo "" | base64 -d > capture_script.html
          node -e "const fs = require('fs'); const path = 'build/web/index.html'; let html = fs.readFileSync(path, 'utf8'); const script = fs.readFileSync('capture_script.html', 'utf8'); html = html.replace('</body>', script + '</body>'); fs.writeFileSync(path, html);"
          # GitHub Pages: avoid 404 on deep links / refresh (Flutter web router)
          cp build/web/index.html build/web/404.html

      - name: Deploy Preview 🚀
        if: success()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: previews/${{ github.ref_name }}
          clean: false # Important: Previews must coexist
          single-commit: true
          
      - name: Ensure Root Index (Pages Activation)
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-root
          cd gh-pages-root
          if [ ! -f "index.html" ]; then
            echo "<html><body>MYTH Build System Active</body></html>" > index.html
            git add index.html
            git commit -m "Initialize Pages Root"
            git push origin gh-pages
          fi

      - name: Build APK
        id: build_apk
        if: success() && github.event.inputs.build_type == 'apk'
        continue-on-error: true
        run: flutter build apk --release

      - name: Upload Artifacts
        if: success() && github.event.inputs.build_type == 'apk' && steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/app/outputs/flutter-apk/app-release.apk